[theme]
# Base theme; users can switch light/dark from the ☰ menu. Charts and custom
# CSS are theme-neutral so both render correctly.
base = "light"
primaryColor = "#185FA5"
font = "sans serif"

[client]
# Page modules live in views/ (not pages/) so Streamlit's native multipage nav
# never auto-detects them — we provide our own st.radio nav in app.py. This flag
# is a belt-and-suspenders guard (only loads when run from this directory).
showSidebarNavigation = false
showErrorDetails = true
# "developer" keeps the full toolbar (⋮ menu) on the *deployed* app so viewers
# can open Settings → Theme to switch Light/Dark. The default ("auto") hides
# Settings for deployed apps, leaving only Print/Record.
toolbarMode = "developer"

[server]
headless = true
port = 8501

[browser]
gatherUsageStats = false
