services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./models:/app/models:ro
    environment:
      - DATABASE_URL=sqlite:////app/data/firewall.db
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - VICTIM_LLM_PROVIDER=${VICTIM_LLM_PROVIDER:-mock}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    ports:
      - "8501:8501"
    environment:
      - FIREWALL_API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: firewall
      POSTGRES_PASSWORD: firewall
      POSTGRES_DB: firewall
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:////mlflow/mlflow.db --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow

volumes:
  postgres_data:
  mlflow_data:
