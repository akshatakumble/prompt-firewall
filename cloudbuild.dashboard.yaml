# Cloud Build: build, push & deploy the Streamlit dashboard to Cloud Run.
# Manual:
#   gcloud builds submit --config cloudbuild.dashboard.yaml \
#     --substitutions=SHORT_SHA=$(git rev-parse --short HEAD),_API_URL=https://prompt-firewall-api-xxxx.run.app
substitutions:
  _REGION: us-central1
  _REPO: prompt-firewall-models
  _SERVICE: prompt-firewall-dashboard
  _API_URL: https://prompt-firewall-api-232758017860.us-central1.run.app

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - docker/Dockerfile.dashboard.cloudrun
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest
      - .

  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args: [push, "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}"]
  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args: [push, "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest"]

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --service-account=prompt-firewall-run@${PROJECT_ID}.iam.gserviceaccount.com
      - --allow-unauthenticated
      - --port=8080
      - --cpu=1
      - --memory=512Mi
      - --min-instances=0
      - --max-instances=2
      - --set-env-vars=FIREWALL_API_URL=${_API_URL}
